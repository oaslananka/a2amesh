{{- if and .Values.registry.enabled (not .Values.registry.auth.oidc.enabled) .Values.registry.auth.createSecret (not .Values.registry.auth.existingSecret) }}
{{- $secretName := include "a2amesh.registrySecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $token := .Values.registry.auth.token }}
{{- if and (not $token) $existing }}
  {{- $token = (index $existing.data .Values.registry.auth.secretKey | b64dec) }}
{{- end }}
{{- if not $token }}
  {{- $token = randAlphaNum 48 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "a2amesh.componentLabels" (dict "root" . "component" "registry") | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.registry.auth.secretKey }}: {{ $token | quote }}
{{- end }}
