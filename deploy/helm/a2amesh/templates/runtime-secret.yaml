{{- if and .Values.runtime.enabled .Values.runtime.providerSecrets.createSecret (not .Values.runtime.providerSecrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "a2amesh.runtimeSecretName" . }}
  labels:
    {{- include "a2amesh.componentLabels" (dict "root" . "component" "runtime") | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{ .Values.runtime.providerSecrets.openAIKeyKey }}: {{ .Values.runtime.providerSecrets.openAIKey | quote }}
  {{- if .Values.runtime.providerSecrets.anthropicKey }}
  {{ .Values.runtime.providerSecrets.anthropicKeyKey }}: {{ .Values.runtime.providerSecrets.anthropicKey | quote }}
  {{- end }}
{{- end }}
