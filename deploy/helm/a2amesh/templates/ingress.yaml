{{- if .Values.ingress.registry.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "a2amesh.registryName" . }}
  labels:
    {{- include "a2amesh.componentLabels" (dict "root" . "component" "registry") | nindent 4 }}
  {{- with (mergeOverwrite (dict) .Values.commonAnnotations .Values.ingress.registry.annotations) }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.registry.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.registry.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.registry.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "a2amesh.registryName" $ }}
                port:
                  name: http
          {{- end }}
    {{- end }}
---
{{- end }}
{{- if .Values.ingress.runtime.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "a2amesh.runtimeName" . }}
  labels:
    {{- include "a2amesh.componentLabels" (dict "root" . "component" "runtime") | nindent 4 }}
  {{- with (mergeOverwrite (dict) .Values.commonAnnotations .Values.ingress.runtime.annotations) }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.runtime.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.runtime.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.runtime.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "a2amesh.runtimeName" $ }}
                port:
                  name: orchestrator
          {{- end }}
    {{- end }}
{{- end }}
