name: Dependency Review

'on':
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:
    inputs:
      base_ref:
        description: Immutable base commit for a dispatched dependency review
        required: true
        type: string
      head_ref:
        description: Immutable head commit for a dispatched dependency review
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Dependency Review / review
    if: github.repository_owner == 'oaslananka' || github.repository_owner == 'oaslananka-ops'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Review pull-request dependency changes
        if: github.event_name != 'merge_group'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294
        with:
          base-ref: ${{ github.event_name == 'workflow_dispatch' && inputs.base_ref || github.event.pull_request.base.sha }}
          head-ref: ${{ github.event_name == 'workflow_dispatch' && inputs.head_ref || github.event.pull_request.head.sha }}
          fail-on-severity: high
          license-check: true
      - name: Confirm constituent dependency reviews
        if: github.event_name == 'merge_group'
        run: echo "Dependency review passed on each constituent pull request before merge-queue admission."
