rules:
  - id: a2amesh.node.no-child-process-shell-import
    message: Use execFile/spawn with a fixed executable and argument array instead of shell-capable exec APIs.
    severity: ERROR
    languages: [typescript, javascript]
    pattern-either:
      - patterns:
          - pattern-inside: |
              import { exec, ... } from 'node:child_process'
              ...
          - pattern: |
              exec(...)
      - patterns:
          - pattern-inside: |
              import { execSync, ... } from 'node:child_process'
              ...
          - pattern: |
              execSync(...)
      - pattern: |
          require('node:child_process').exec(...)
      - pattern: |
          require('node:child_process').execSync(...)

  - id: a2amesh.node.no-shell-true
    message: Do not enable shell execution for child processes; pass an executable and argument array directly.
    severity: ERROR
    languages: [typescript, javascript]
    pattern-either:
      - pattern: |
          execFile(..., { ..., shell: true, ... })
      - pattern: |
          execFileSync(..., { ..., shell: true, ... })
      - pattern: |
          spawn(..., { ..., shell: true, ... })
      - pattern: |
          spawnSync(..., { ..., shell: true, ... })

  - id: a2amesh.node.no-disabled-tls-verification
    message: TLS certificate verification must not be disabled.
    severity: ERROR
    languages: [typescript, javascript]
    pattern-either:
      - pattern: |
          $OPTIONS = { ..., rejectUnauthorized: false, ... }
      - pattern: |
          process.env.NODE_TLS_REJECT_UNAUTHORIZED = '0'
      - pattern: |
          process.env.NODE_TLS_REJECT_UNAUTHORIZED = "0"

  - id: a2amesh.node.no-dynamic-evaluation
    message: Dynamic code evaluation is prohibited.
    severity: ERROR
    languages: [typescript, javascript]
    pattern-either:
      - pattern: |
          eval(...)
      - pattern: |
          new Function(...)
