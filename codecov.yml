codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: '70...100'
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
        only_pulls: true
        flags:
          - unit
    patch:
      default:
        target: auto
        threshold: 1%
        informational: true
        only_pulls: true
        flags:
          - unit

comment:
  layout: 'reach, diff, flags, files'
  behavior: default
  require_changes: true
  require_base: false
  require_head: true
  require_bundle_changes: true

bundle_analysis:
  warning_threshold: '5%'
  status: informational

flags:
  unit:
    paths:
      - packages/
    carryforward: false
